project:
  name: coffee-seg
  seed: 42

data:
  images_dir: data/iachim_dataset_export/data_compressed   # quét đệ quy field_*/10/... (ảnh drone gốc)
  masks_dir: data/masks           # nhãn lưu ở masks/corrected/, export ở data/export/

sam:
  variant: sam2                   # sam2 | sam3 (đổi ở phase sau)
  device: cuda                    # cuda | cpu (không có GPU -> đặt cpu, rất chậm)
  # LƯU Ý: model_cfg là TÊN CONFIG NỘI BỘ của package sam2 (Hydra, pkg://sam2),
  #        KHÔNG phải file trong repo. Bắt buộc có tiền tố "configs/sam2.1/".
  #   large      : configs/sam2.1/sam2.1_hiera_l.yaml   + weights/sam2.1_hiera_large.pt
  #   base_plus  : configs/sam2.1/sam2.1_hiera_b+.yaml  + weights/sam2.1_hiera_base_plus.pt
  #   small      : configs/sam2.1/sam2.1_hiera_s.yaml   + weights/sam2.1_hiera_small.pt
  #   tiny (test): configs/sam2.1/sam2.1_hiera_t.yaml   + weights/sam2.1_hiera_tiny.pt
  checkpoint: weights/sam2.1_hiera_large.pt
  model_cfg: configs/sam2.1/sam2.1_hiera_l.yaml
